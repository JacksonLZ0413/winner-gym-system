{% extends "base.html" %}

{% block title %}添加教练 - 管理后台{% endblock %}

{% block content %}
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2>👨‍🏫 添加新教练</h2>
        <a href="{{ url_for('admin_coaches') }}" class="btn btn-secondary">返回</a>
    </div>

    <div class="card">
        <form method="POST" action="{{ url_for('admin_add_coach') }}">
            <input type="hidden" name="_csrf" value="{{ csrf_token }}">
            <div class="form-group">
                <label>姓名 <span style="color:red">*</span></label>
                <input type="text" name="name" required placeholder="如：陈教练">
            </div>
            <div class="form-group">
                <label>登录用户名 <span style="color:red">*</span></label>
                <input type="text" name="username" required placeholder="用于教练登录">
            </div>
            <div class="form-group">
                <label>登录密码 <span style="color:red">*</span></label>
                <input type="password" name="password" required placeholder="至少6位">
            </div>
            <div class="form-group">
                <label>擅长项目</label>
                <input type="text" name="specialty" placeholder="如：增肌减脂|体态矫正（用|分隔）">
            </div>
            <div class="form-group">
                <label>从业年限</label>
                <input type="number" name="experience" min="0" max="50" value="1">
            </div>
            <div class="form-group">
                <label>个人简介</label>
                <textarea name="bio" rows="3" placeholder="教练简介..."></textarea>
            </div>
            <div style="display:flex; gap:1rem;">
                <button type="submit" class="btn btn-primary" style="flex:1;">确认添加</button>
                <a href="{{ url_for('admin_coaches') }}" class="btn btn-secondary" style="flex:1; text-align:center;">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

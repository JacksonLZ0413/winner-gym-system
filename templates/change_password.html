{% extends "base.html" %}

{% block title %}修改密码{% endblock %}

{% block content %}
<div class="container" style="max-width: 450px;">
    <div class="card">
        <h2 style="text-align:center; margin-bottom:2rem;">🔒 修改密码</h2>
        <form method="POST">
            <input type="hidden" name="_csrf" value="{{ csrf_token }}">

            <div class="form-group">
                <label>原密码</label>
                <input type="password" name="old_password" required placeholder="请输入原密码">
            </div>

            <div class="form-group">
                <label>新密码</label>
                <input type="password" name="new_password" required placeholder="至少6位" minlength="6">
            </div>

            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" name="confirm_password" required placeholder="再输一次新密码">
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">确认修改</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary" style="width:100%; margin-top:0.75rem; display:block; text-align:center;">取消</a>
        </form>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}重置密码 - 管理后台{% endblock %}

{% block content %}
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2>🔑 重置密码</h2>
        <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">返回</a>
    </div>

    <div class="card">
        <p style="margin-bottom: 1.5rem;">为用户 <strong>{{ user.name }}</strong> ({{ user.username }}) 重置密码</p>
        <form method="POST" action="{{ url_for('admin_change_user_password') }}">
            <input type="hidden" name="_csrf" value="{{ csrf_token }}">
            <input type="hidden" name="user_id" value="{{ user.id }}">
            <div class="form-group">
                <label>新密码</label>
                <input type="password" name="new_password" required placeholder="至少6位" minlength="6">
            </div>
            <div style="display:flex; gap:1rem;">
                <button type="submit" class="btn btn-primary" style="flex:1;">确认修改</button>
                <a href="{{ url_for('admin_users') }}" class="btn btn-secondary" style="flex:1; text-align:center;">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
